name: Build Windows AIFX Player

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Clean build folders
        shell: pwsh
        run: |
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          if (Test-Path "dist")  { Remove-Item -Recurse -Force "dist" }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm packaging/aifx_player_windows.spec

      - name: Build Windows installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "packaging\aifx_player_windows.iss"

      - name: Verify dist output
        shell: pwsh
        run: |
          Write-Host "=== DIST CONTENTS ==="
          if (-not (Test-Path "dist")) {
            Write-Host "ERROR: dist folder not found"
            exit 1
          }

          Get-ChildItem -Recurse "dist" | Select-Object FullName

          if (-not (Test-Path "dist\AIFX Player.exe")) {
            Write-Host "ERROR: Expected dist\AIFX Player.exe not found"
            exit 1
          }

          if (-not (Test-Path "dist\AIFX-Player-Setup.exe")) {
            Write-Host "ERROR: Expected dist\AIFX-Player-Setup.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIFX-Player-Windows
          path: |
            dist/AIFX Player.exe
            dist/AIFX-Player-Setup.exe
